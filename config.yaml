# NeuroQuant v2.0 — Default Configuration
# This file is the canonical configuration shipped inside the wheel.
# After ``pip install neuroquant`` you can drop a copy of it next to your
# project with:
#
#     neuroquant --init           # writes ./config.yaml
#     neuroquant --init --force   # overwrite an existing ./config.yaml
#
# Every pipeline knob is exposed here so code does not need to be edited.
# Keys below map 1:1 onto the dataclasses in config.py (QuantizationConfig +
# HyperparameterSet). Unknown keys are ignored at load time.

# ── Model ────────────────────────────────────────────────────────────────
model:
  name: "mobilenetv2"           # any torchvision name (e.g. mobilenetv2, resnet18,
                                #  resnet50, vgg16, efficientnet_b0) OR empty/null
                                #  if you supply ``class`` below. For task=detection
                                #  use a torchvision.models.detection name such as
                                #  ``fasterrcnn_resnet50_fpn`` or ``ssd300_vgg16``.
  path: null                    # optional: path to pre-trained weights (.pth)
  class: null                   # optional: fully-qualified "pkg.mod.ClassName"
                                #  for a custom torch.nn.Module
  num_classes: 10
  input_shape: [3, 32, 32]      # (C, H, W)
  task: "classification"        # classification | detection
                                #  - classification: standard last-Linear head
                                #    swap + first-Conv stride tweak for small inputs
                                #  - detection: load from torchvision.models.detection;
                                #    head adaptation is automatic only for the
                                #    Faster/Mask/Keypoint R-CNN family.

# ── Dataset ──────────────────────────────────────────────────────────────
dataset:
  name: "cifar10"               # built-in options: cifar10 | cifar100 | imagefolder | synthetic
                                #  set to anything else only when ``class`` (below) is supplied.
  path: "./data"
  class: null                   # optional: fully-qualified torch Dataset class
                                #  (HuggingFace-style ``split=`` or torchvision-style ``train=``
                                #   are auto-detected)
  train_dir: null               # optional ImageFolder train dir (relative to dataset.path
                                #  or absolute)
  val_dir: null                 # optional ImageFolder val dir
  test_dir: null                # optional ImageFolder test dir
  batch_size: 128
  num_workers: 4                # auto-forced to 0 on Windows

# ── Output ───────────────────────────────────────────────────────────────
output:
  dir: "./artifacts"
  mlflow_tracking_uri: "./mlruns"
  experiment_name: "neuroquant_v2"

# ── Methods to run in Phase 1f (and PTQ gating in Phase 1c) ──────────────
# Valid values: ptq | qat | gptq | smoothquant | awq | smoothquant_gptq
# Add or remove entries to control which methods are evaluated.
# Order does not matter. Unknown methods are rejected at config-load time.
methods:
  - ptq
  - qat
  - gptq
  - smoothquant
  - awq
  - smoothquant_gptq

# ── Bitwidths ────────────────────────────────────────────────────────────
# ``supported`` must be a subset of {4, 8} — the framework has backends
# only for these two precisions. Adding 2 or 16 will fail mid-pipeline.
bitwidths:
  supported: [4, 8]
  io_layer: 8                   # force this bitwidth on first + last layers (must be 4 or 8)

# ── Hyperparameters ──────────────────────────────────────────────────────
hyperparams:
  # General
  seed: 42
  device: "auto"                # auto | cuda | cpu | mps

  # Calibration (activation observers + PTQ strategy)
  calibration_batches: 20
  calibration_strategy_io: "kl_divergence"      # kl_divergence | mse
  calibration_strategy_intermediate: "mse"      # kl_divergence | mse

  # Hessian / clustering
  hessian_batches: 20
  cluster_high_percentile: 0.66
  cluster_low_percentile: 0.33
  hessian_estimator: "fisher"           # fisher | diag_hessian

  # NSGA-II search
  nsga_population_size: 8
  nsga_generations: 20
  nsga_crossover_prob: 0.9
  nsga_mutation_prob: 0.1
  nsga_accuracy_objective: "top1"   # top1 | top5 — objective driving NSGA fitness

  # FITCompress seed generation
  fit_low_percentile: 0.25          # below → force INT4 (compress)
  fit_high_percentile: 0.75         # above → force INT8 (preserve)

  # AdaRound
  adaround_epochs: 100
  adaround_lr: 0.0001
  adaround_reg_param: 0.01          # λ for the entropy regulariser
  adaround_ordered: true            # canonical input→output traversal
  adaround_max_samples_per_layer: 1024

  # QAT
  qat_epochs: 5
  qat_lr: 0.001
  qat_momentum: 0.9
  qat_weight_decay: 0.0001
  qat_early_stop_patience: 3
  qat_warmstart_source: "ptq_best_acc"   # ptq_best_acc | ptq_best_tradeoff
  # W+A QAT (real INT inference contract)
  qat_act_bitwidth: 8                    # always INT8 activations (the only supported value)
  qat_fold_bn: true                      # fold Conv-BN before QAT
  # Knowledge distillation (FP32 teacher → quantized student)
  qat_distill_alpha: 0.5                 # 0 disables KD
  qat_distill_temperature: 4.0

  # Multi-fidelity PTQ rerank (phase 1c)
  ptq_real_rerank_topk: 3                # top-K NSGA candidates → real PTQ rerank
  ptq_tradeoff_max_acc_drop: 1.0         # max Top-1 drop (pp) for tradeoff pick

  # GPTQ
  gptq_block_size: 128
  gptq_percdamp: 0.01

  # SmoothQuant
  smoothquant_alpha: 0.5            # 0 → all difficulty on activations, 1 → on weights
  smoothquant_per_layer_alpha: true # F3: per-layer α (set false for paper baseline)
  smoothquant_alpha_grid: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8]
  smoothquant_alpha_strategy: "closed_form"  # closed_form | grid
                                             # closed_form: α = max|X|^β / (max|X|^β + max|W|^β)
                                             #              ~6× faster, paper-recipe default.
                                             # grid       : exhaustive search (ablation only).

  # AWQ (F2 production-corrected — input-scale wrapper + per-layer α)
  awq_group_size: 128
  awq_alpha_grid: [0.0, 0.25, 0.5, 0.75, 1.0]
  awq_alpha_strategy: "golden"      # golden | grid
                                    # golden: golden-section search over [min, max] of grid;
                                    #         ~4 evals vs 5–9, no Optuna dep.
                                    # grid  : exhaustive baseline (ablation only).
  awq_keep_top_pct: 0.0             # 0.01 keeps the top 1% channels at FP16

  # Cluster-amortized α search. Reuses Phase 1a Hessian/Fisher
  # clusters: search α on one representative per tier, broadcast to
  # the rest. Falls back to per-layer search when clusters are absent.
  alpha_cluster_amortize: true

  # XAI / explainability
  xai_num_images: 5
  xai_grad_cam_alpha: 0.4
  xai_shap_n_samples: 50
  xai_plot_dpi: 150

  # Evaluation + reporting
  eval_primary_accuracy: "top1"     # top1 | top5 — printed in the final report
  latency_warmup_runs: 10
  latency_measure_runs: 50
  latency_batch_size: 1
  hardware_report_path: ""          # path to Vivado/Quartus JSON/CSV; empty = skip
  use_latency_in_pareto: false      # adds mean latency as an MLflow Pareto metric

  # Wave 4: ONNX export + hardware-aware search (J1/J2/J3/J4/C1/C2)
  onnx_export_enabled: true         # export each quantized result to .onnx + measure ORT latency
  hardware_aware_search: false      # opt-in: build per-layer LUT and run NSGA in 3-obj mode
  latency_lut_bitwidths: [4, 8]     # bitwidths the LUT profiles (must be subset of {4, 8})

# ── Phases ───────────────────────────────────────────────────────────────
# Comment out any phase to skip it. Order is fixed; the pipeline always
# executes them in the registry order regardless of yaml ordering.
# Valid phase IDs:
#   phase_0_preparation
#   phase_1a_hessian_clustering
#   phase_1b_fitcompress
#   phase_1c_nsga_search
#   phase_1d_adaround
#   phase_1e_qat
#   phase_1f_gptq_smooth_awq
#   phase_2_pareto
#   phase_3_xai
#   phase_4_mlflow
phases:
  - phase_0_preparation
  - phase_1a_hessian_clustering
  - phase_1b_fitcompress
  - phase_1c_nsga_search
  - phase_1d_adaround
  - phase_1e_qat
  - phase_1f_gptq_smooth_awq
  - phase_2_pareto
  - phase_3_xai
  - phase_4_mlflow
