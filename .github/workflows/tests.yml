name: tests

# Run on every push to main and on every pull request. The matrix
# stays CPU-only so this fits on GitHub's free runners — the smoke
# tests are designed to finish in seconds without a GPU.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU-only torch + project + dev extras)
        # Use the CPU index so we don't pull multi-GB CUDA wheels on
        # the runners. ``--index-url`` resolves torch / torchvision
        # from there, then ``--extra-index-url`` falls back to PyPI
        # for everything else (numpy, pydantic, …).
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch torchvision
          pip install -e .[dev]

      - name: Show package versions (debug aid for CI failures)
        run: |
          python -c "import torch, neuroquant; print('torch', torch.__version__); print('neuroquant', neuroquant.__version__)"

      - name: Run pytest
        run: pytest -q
