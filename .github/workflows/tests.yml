# NeuroQuant v2.0 — CI: lint + unit tests + coverage gate (Wave 6)
#
# Two jobs:
#   1. ``test`` — runs the default unit-test suite on Linux + Windows,
#      Python 3.10/3.11/3.12. Coverage gate (≥80% lines) is enforced
#      via the ``--cov-fail-under=80`` flag in pyproject.toml.
#   2. ``integration`` — runs the wave-6 K3 full-pipeline smoke once
#      on Linux + Python 3.12. The smoke takes ~1 minute and would
#      multiply the matrix cost; pinning to a single combination is
#      the right trade-off for a "did the phases hand off" check.
#
# Lint is done with ruff: fast, deterministic, no opinions about line
# length unless we set them. The ruff config lives in pyproject.toml
# (Wave 7 O1 will populate it; for now we lint with default rules).

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff (non-blocking on first wave)
        # Reports lint findings but does not fail the build until
        # Wave 7 lands the project-wide ruff config. Once that ships
        # the ``continue-on-error`` flag should be removed.
        continue-on-error: true
        run: ruff check . --statistics

  test:
    name: Unit tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov hypothesis

      - name: Run unit tests with coverage gate
        # ``-m "not integration"`` keeps the slow K3 smoke out of the
        # default matrix — it has its own job below. The coverage
        # gate (80%) lives in pyproject.toml's ``--cov-fail-under``.
        run: pytest -q -m "not integration"

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  integration:
    name: Integration smoke (full pipeline)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov hypothesis

      - name: Run integration smoke
        # No coverage gate here — the smoke is too narrow to move the
        # number meaningfully, and the unit-test job already enforces
        # ≥80%. ``--no-cov`` keeps the run fast and the report
        # uncluttered.
        run: pytest tests/integration -q -m integration --no-cov
